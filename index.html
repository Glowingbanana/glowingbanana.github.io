<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice PDF → Excel</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:        #0f0f11;
            --surface:   #18181c;
            --surface2:  #202026;
            --border:    #2e2e38;
            --border2:   #3a3a48;
            --accent:    #4ade80;
            --accent2:   #22c55e;
            --accentDim: rgba(74,222,128,0.10);
            --accentGlow:rgba(74,222,128,0.18);
            --text:      #f0f0f2;
            --muted:     #8888a0;
            --danger:    #f87171;
            --dangerDim: rgba(248,113,113,0.10);
            --info:      #60a5fa;
            --infoDim:   rgba(96,165,250,0.10);
            --warn:      #fbbf24;
            --radius:    10px;
            --radiusLg:  16px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2.5rem 1rem 4rem;
        }

        /* subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(74,222,128,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74,222,128,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0 0 0.5rem;
        }

        .logo {
            width: 44px;
            height: 44px;
            background: var(--accentDim);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .header-text h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            color: var(--text);
            line-height: 1.1;
        }

        .header-text p {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 2px;
            font-weight: 300;
        }

        .badge {
            margin-left: auto;
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            background: var(--accentDim);
            border: 1px solid rgba(74,222,128,0.25);
            padding: 3px 10px;
            border-radius: 99px;
            white-space: nowrap;
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radiusLg);
            padding: 1.25rem;
        }

        .card-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-bottom: 0.85rem;
        }

        /* ── Upload Zone ── */
        .upload-area {
            border: 1.5px dashed var(--border2);
            border-radius: var(--radius);
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: var(--surface2);
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 120%, var(--accentGlow), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--accent);
        }

        .upload-area:hover::before,
        .upload-area.dragover::before {
            opacity: 1;
        }

        .upload-area input { display: none; }

        .upload-icon {
            font-size: 2rem;
            margin-bottom: 0.6rem;
            display: block;
        }

        .upload-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 0.3rem;
        }

        .upload-hint {
            font-size: 0.78rem;
            color: var(--muted);
        }

        /* ── File Info ── */
        .file-info {
            display: none;
            background: var(--accentDim);
            border: 1px solid rgba(74,222,128,0.2);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
            gap: 0.6rem;
            align-items: center;
        }

        .file-info.show { display: flex; }

        .file-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            box-shadow: 0 0 6px var(--accent);
        }

        .file-info-text { flex: 1; min-width: 0; }

        .file-name {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 1px;
        }

        /* ── Options ── */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            font-size: 0.83rem;
            color: var(--muted);
            cursor: pointer;
            padding: 0.6rem 0.85rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface2);
            transition: border-color 0.2s, color 0.2s;
            user-select: none;
        }

        .option-item:hover { border-color: var(--border2); color: var(--text); }

        .option-item input[type="checkbox"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1.5px solid var(--border2);
            border-radius: 4px;
            background: var(--surface);
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            transition: background 0.15s, border-color 0.15s;
        }

        .option-item input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .option-item input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 3px; top: 1px;
            width: 5px; height: 8px;
            border: 2px solid #0f0f11;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }

        /* ── Paste Area ── */
        .paste-label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            display: block;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            background: var(--surface2);
            color: var(--text);
            resize: vertical;
            transition: border-color 0.2s;
            line-height: 1.5;
        }

        textarea:focus {
            outline: none;
            border-color: var(--border2);
        }

        textarea::placeholder { color: var(--muted); }

        /* ── Status ── */
        .status {
            display: none;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            font-size: 0.83rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .status.show { display: block; }

        .status.success {
            background: var(--accentDim);
            color: var(--accent);
            border: 1px solid rgba(74,222,128,0.2);
        }

        .status.error {
            background: var(--dangerDim);
            color: var(--danger);
            border: 1px solid rgba(248,113,113,0.2);
        }

        .status.loading {
            background: var(--infoDim);
            color: var(--info);
            border: 1px solid rgba(96,165,250,0.2);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(96,165,250,0.25);
            border-top-color: var(--info);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Preview ── */
        .preview {
            display: none;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .preview.show { display: block; }

        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        .preview-title {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .preview-dots {
            display: flex;
            gap: 5px;
        }

        .preview-dots span {
            width: 8px; height: 8px;
            border-radius: 50%;
        }

        #previewContent {
            padding: 0.85rem 1rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--muted);
            white-space: pre-wrap;
            max-height: 180px;
            overflow-y: auto;
            line-height: 1.6;
        }

        #previewContent::-webkit-scrollbar { width: 4px; }
        #previewContent::-webkit-scrollbar-track { background: transparent; }
        #previewContent::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        /* ── Buttons ── */
        .button-group {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.65rem;
        }

        button {
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.88rem;
            transition: all 0.18s;
            white-space: nowrap;
        }

        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-clear {
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-clear:hover:not(:disabled) {
            border-color: var(--border2);
            color: var(--text);
        }

        .btn-convert {
            background: var(--accent);
            color: #0a1a0f;
            font-weight: 700;
            letter-spacing: 0.01em;
            grid-column: 1 / -1;
            box-shadow: 0 0 20px rgba(74,222,128,0.15);
        }

        .btn-convert:hover:not(:disabled) {
            background: var(--accent2);
            box-shadow: 0 0 28px rgba(74,222,128,0.28);
            transform: translateY(-1px);
        }

        .btn-download {
            display: none;
            background: var(--surface2);
            color: var(--accent);
            border: 1px solid rgba(74,222,128,0.3);
        }

        .btn-download:hover:not(:disabled) {
            background: var(--accentDim);
            border-color: var(--accent);
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            padding-top: 0.5rem;
            opacity: 0.6;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .options-grid { grid-template-columns: 1fr; }
            .badge { display: none; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="logo">⚡</div>
        <div class="header-text">
            <h1>Invoice Extractor</h1>
            <p>PDF → Excel · Tax Invoice Parser</p>
        </div>
        <span class="badge">SGD · GST 9%</span>
    </div>

    <!-- Upload -->
    <div class="card">
        <div class="card-label">Upload Invoice PDF</div>
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept=".pdf,application/pdf" />
            <span class="upload-icon">📄</span>
            <div class="upload-title">Drop PDF here or click to browse</div>
            <div class="upload-hint">Supports digital & scanned invoices · OCR enabled</div>
        </div>

        <div style="margin-top: 0.75rem;">
            <div class="file-info" id="fileInfo">
                <div class="file-dot"></div>
                <div class="file-info-text">
                    <div class="file-name" id="fileName"></div>
                    <div class="file-size" id="fileSize"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Options -->
    <div class="card">
        <div class="card-label">Options</div>
        <div class="options-grid">
            <label class="option-item">
                <input type="checkbox" id="forceOCR" />
                <span>Force OCR mode</span>
            </label>
            <label class="option-item">
                <input type="checkbox" id="excludeDraft" />
                <span>Exclude Draft invoices</span>
            </label>
        </div>
    </div>

    <!-- Paste fallback -->
    <div class="card">
        <div class="card-label">Or paste text directly</div>
        <label class="paste-label" for="textInput">If you don't have a PDF, paste invoice text below</label>
        <textarea id="textInput" placeholder="Paste invoice text here…"></textarea>
    </div>

    <!-- Status -->
    <div class="status" id="status"></div>

    <!-- Preview -->
    <div class="preview" id="preview">
        <div class="preview-header">
            <span class="preview-title">Extracted text preview</span>
            <div class="preview-dots">
                <span style="background:#f87171"></span>
                <span style="background:#fbbf24"></span>
                <span style="background:#4ade80"></span>
            </div>
        </div>
        <div id="previewContent"></div>
    </div>

    <!-- Buttons -->
    <div class="button-group">
        <button class="btn-clear" id="btnClear" onclick="clearFile()">Clear</button>
        <button class="btn-convert" id="btnConvert" onclick="convertPDF()" disabled>Convert to Excel</button>
        <button class="btn-download" id="btnDownload" onclick="downloadExcel().catch(e => showStatus('Error: ' + e.message, 'error'))">⬇ Download Excel</button>
    </div>

    <div class="footer">Handles digital PDFs · Scanned PDFs (OCR) · Split pages</div>
</div>

<script>console.info('Build: InvoiceExtractor v2.0');</script>
<script src="script.js?v=2.0"></script>

<!-- Override showStatus to handle loading spinner -->
<script>
    const _origShow = window.showStatus;
    window.showStatus = function(msg, type) {
        const el = document.getElementById('status');
        el.className = `status show ${type}`;
        if (type === 'loading') {
            el.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
        } else {
            el.innerHTML = msg;
        }
    };
</script>
</body>
</html>
